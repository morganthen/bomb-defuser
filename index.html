<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://unpkg.com/nes.css@latest/css/nes.min.css"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <link
      rel="preload"
      href="assets/video/explosion.mp4"
      as="video"
      type="video/mp4"
    />
    <link
      rel="preload"
      href="assets/video/pre-explosion.mp4"
      as="video"
      type="video/mp4"
    />
    <link rel="stylesheet" href="./style.css" />
    <script type="module" src="./script.js" defer></script>
    <title>Bomb Defuser</title>
  </head>
  <body class="warehouse-bg">
    <video id="bg-pre-explosion" autoplay loop playsinline class="bg-video">
      <source src="assets/video/pre-explosion.mp4" type="video/mp4" />
    </video>
    <video
      id="bg-explosion"
      playsinline
      preload="auto"
      class="bg-video bg-video--hidden"
    >
      <source src="assets/video/explosion.mp4" type="video/mp4" />
    </video>
    <main>
      <div class="game-container">
        <header class="header nes-container with-title is-centered is-rounded">
          <p class="title">Bomb Defuser</p>
          <div class="header__status">
            <p>Guesses Remaining: <span class="guesses-remaining"></span></p>
            <p class="header__message"></p>
          </div>
        </header>
        <div class="timer">
          <p>Time: <span class="timer__display">60</span>s</p>
          <progress
            class="nes-progress is-warning timer__progress"
            value="100"
            max="100"
          ></progress>
        </div>
        <div
          class="nes-container is-centered is-dark is-rounded word-display"
        ></div>
        <div class="keyboard"></div>
      </div>
    </main>
    <dialog class="game-over nes-dialog is-rounded">
      <p class="game-over__message">WASTED</p>
      <p class="game-over__message--small"></p>
      <button class="nes-btn is-warning resetBtn">Play Again</button>
    </dialog>
    <div class="crt-overlay"></div>
  </body>
</html>
